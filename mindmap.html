<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Mind Map — HRI Learning Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0d0d14; overflow: hidden; }
  .bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    height: 44px;
    background: rgba(13,13,20,0.97);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: center;
    padding: 0 20px; gap: 16px;
  }
  .bar-title { font-family: -apple-system, sans-serif; font-size: 13px; font-weight: 500; color: #c4b5fd; }
  .bar-sub   { font-family: -apple-system, sans-serif; font-size: 11px; color: #4a4860; }
  .bar a {
    font-family: -apple-system, sans-serif; font-size: 11px;
    color: #7c6fad; text-decoration: none; margin-left: auto;
    border: 0.5px solid rgba(124,111,173,0.4);
    padding: 4px 10px; border-radius: 6px;
  }
  .bar a:hover { color: #a78bfa; border-color: rgba(167,139,250,0.5); }
  iframe {
    position: fixed;
    top: 44px; left: 0; right: 0; bottom: 0;
    width: 100%; height: calc(100% - 44px);
    border: none;
  }
</style>
</head>
<body>
<div class="bar">
  <span class="bar-title">ML Mind Map</span>
  <span class="bar-sub">Machine Learning · Data Processing · Mathematics · Models</span>
  <a href="mindmap.pdf" download>Download PDF</a>
</div>
<iframe src="mindmap.pdf" type="application/pdf"></iframe>
</body>
</html>
